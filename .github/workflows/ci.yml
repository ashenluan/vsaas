name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Database type check
        run: pnpm --filter @vsaas/database type-check

      - name: UI type check
        run: pnpm --filter @vsaas/ui type-check

      - name: API tests
        run: cd apps/api && pnpm test

      - name: Admin tests
        run: cd apps/admin && pnpm exec vitest run

      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Build all
        run: pnpm turbo build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_STANDALONE: 'true'

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [api, web, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: ${{ secrets.ACR_REGISTRY != '' }}
          tags: |
            ${{ secrets.ACR_REGISTRY }}/vsaas/${{ matrix.app }}:latest
            ${{ secrets.ACR_REGISTRY }}/vsaas/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
